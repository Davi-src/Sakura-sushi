<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Davi-src">
  <!--======= Style =======-->
  <link rel="stylesheet" href="src/css/style.css">
  <!--======= Title =======-->
  <title>Sakura Sushi - Sushi Premium</title>
</head>

<body>
  <header class="header container">
    <div class="logo">
      <img src="assets/image.png" alt="">
    </div>

    <nav class="nav-bar">
      <ul class="nav-list">
        <li class="nav-item"><a href="#">Cardápio</a></li>
        <li class="nav-item"><a href="#">Combo</a></li>
        <li class="nav-item"><a href="#">Promoções</a></li>
        <li class="nav-item"><a href="#">Sobre</a></li>
        <li class="nav-item"><a href="#">Contato</a></li>
      </ul>
    </nav>

    <div class="menu">
      
    </div>
  </header>

  <main class="container">
    <div class="hero">
      <video
          class="hero-video"
          id="video"
          muted
          autoplay
          playsinline
          loop
          width="1280"
          height="720"
          src="assets/Sony 4K Demo - Sushi in Dolby Digital.mp4">
      </video>

      <div class="hero-badge">
        <span>SUSHI PREMIUM</span>
      </div>

      <h1 class="hero-title">
        O melhor sushi <br> da cidade, entregue frescor na sua casa.
      </h1>

      <div class="hero-footer">
        <p>
          Peixes selecionados diariamente, ingredientes premium e entrega rápida.
        </p>

        <div class="hero-actions">

          <button class="primary">
            <span>🍣</span>
            Fazer Pedido
          </button>
          <button class="secondary">
            <span>📕</span>
             Ver Cardápio
          </button>
      </div>
      </div>
    </div>
  </main>

  <script src="src/js/script.js"></script>
</body>

</html>
