<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Davi-src">
  <!--======= Style =======-->
  <link rel="stylesheet" href="src/css/style.css">
  <!--======= Title =======-->
  <title>Sakura Sushi - Sushi Premium</title>
</head>

<body>
  <header class="header">
    <div class="logo">
      <p>
        <a href="#">Sakura</a>
        <span>Sushi</span>
      </p>
    </div>

    <nav class="nav-bar">

    </nav>
  </header>

  <main class="container">
    <div class="hero">
      <video
          class="hero-video"
          id="video"
          muted
          autoplay
          playsinline
          loop
          width="1280"
          height="720"
          src="assets/Sony 4K Demo - Sushi in Dolby Digital.mp4">
      </video>

      <div class="hero-badge">
        <span>SUSHI PREMIUM</span>
      </div>

      <h1 class="hero-title">
        O melhor sushi <br> da cidade, entregue frescor na sua casa.
      </h1>

      <div class="hero-footer">
        <p>
          Peixes selecionados diariamente, ingredientes premium e entrega rápida.
        </p>

        <div class="hero-actions">
          <a>
            🍣 Fazer Pedido
          </a>
          <a>
            Ver Cardápio
          </a>
      </div>
      </div>

      

    </div>
  </main>

  <script src="src/js/script.js"></script>
</body>

</html>
